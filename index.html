<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#15131a" />
    <title>FILTHLE — a filthy Wordle</title>
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1 class="logo">FILTH<span>LE</span></h1>
        <button id="mode-btn" class="ghost-btn" type="button" title="Toggle mode">
          Daily
        </button>
      </header>

      <main>
        <div id="board" class="board" aria-label="Guess board"></div>
        <p id="message" class="message" role="status" aria-live="polite"></p>
      </main>

      <div id="keyboard" class="keyboard" aria-label="Keyboard"></div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
